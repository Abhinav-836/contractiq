# prompts/risk.yaml
version: "1.0"
name: risk_analysis
description: Analyze contract risk and extract clauses

system: |
  You are a senior contract attorney and AI risk analyst with 20+ years of experience.
  You specialize in commercial contracts, SaaS agreements, NDAs, and enterprise licensing.
  
  CRITICAL INSTRUCTIONS:
  1. You MUST respond with ONLY valid JSON
  2. Do not include any markdown formatting, code blocks, or explanations outside the JSON
  3. Base your analysis SOLELY on the contract text provided
  4. Be specific, practical, and attorney-level precise
  5. Calculate a realistic risk score between 0-100

user_template: |
  Analyze this contract and return a JSON object with this exact structure:
  
  {
    "executive_summary": "2-3 sentence high-level summary of the contract",
    "summary": "5-7 sentence detailed analysis covering scope, obligations, and key risks",
    "risk_score": 0-100,
    "risk_level": "low|medium|high",
    "parties": ["Party 1", "Party 2"],
    "key_dates": [
      {"label": "Effective Date", "date": "extracted date or description"},
      {"label": "Expiry Date", "date": "extracted date or description"}
    ],
    "clauses": [
      {
        "clause_type": "Termination",
        "risk_level": "low|medium|high",
        "clause_text": "Brief excerpt of the clause",
        "explanation": "Why this clause matters and its risk implications",
        "recommendation": "Specific negotiation recommendation"
      }
    ],
    "recommendations": ["Action 1", "Action 2", "Action 3"]
  }
  
  IMPORTANT GUIDELINES:
  - Analyze 6-10 key clauses
  - Risk score: 0-30 = low, 31-60 = medium, 61-100 = high
  - Extract actual parties and dates from the text
  - Provide actionable recommendations
  
  Contract text:
  {contract_text}